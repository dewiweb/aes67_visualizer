<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#334155" stroke-width="4"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#334155" stroke-width="2"/>
  
  <!-- Audio waveform bars -->
  <g fill="url(#wave)">
    <!-- Left side bars -->
    <rect x="80" y="220" width="24" height="72" rx="4"/>
    <rect x="116" y="180" width="24" height="152" rx="4"/>
    <rect x="152" y="140" width="24" height="232" rx="4"/>
    <rect x="188" y="160" width="24" height="192" rx="4"/>
    
    <!-- Center bars (taller) -->
    <rect x="224" y="100" width="28" height="312" rx="4"/>
    <rect x="260" y="120" width="28" height="272" rx="4"/>
    
    <!-- Right side bars -->
    <rect x="300" y="150" width="24" height="212" rx="4"/>
    <rect x="336" y="130" width="24" height="252" rx="4"/>
    <rect x="372" y="170" width="24" height="172" rx="4"/>
    <rect x="408" y="200" width="24" height="112" rx="4"/>
  </g>
  
  <!-- AES67 text arc at bottom -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#94a3b8">
    AES67
  </text>
  
  <!-- Small network indicator dots -->
  <circle cx="140" cy="80" r="8" fill="#22d3ee" opacity="0.8"/>
  <circle cx="180" cy="60" r="6" fill="#3b82f6" opacity="0.6"/>
  <circle cx="332" cy="60" r="6" fill="#3b82f6" opacity="0.6"/>
  <circle cx="372" cy="80" r="8" fill="#22d3ee" opacity="0.8"/>
  
  <!-- Connection lines -->
  <path d="M148 80 Q 256 30 364 80" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
</svg>
